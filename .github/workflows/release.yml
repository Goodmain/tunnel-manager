name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the release + upload the asset in this repo

jobs:
  release:
    name: Build, release & update tap
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build release artifact
        run: make release

      - name: Compute sha256
        id: sha
        run: echo "sha=$(shasum -a 256 build/TunnelManager.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release + upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: build/TunnelManager.zip
          generate_release_notes: true

      - name: Render & push cask to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.v.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Goodmain/homebrew-tunnel-manager.git" tap
          mkdir -p tap/Casks
          # Unquoted heredoc: ${VERSION}/${SHA} expand; Ruby #{...} is left intact.
          cat > tap/Casks/tunnel-manager.rb <<EOF
          cask "tunnel-manager" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/Goodmain/tunnel-manager/releases/download/v#{version}/TunnelManager.zip"
            name "Tunnel Manager"
            desc "Menu bar app for AWS SSM port-forwarding tunnels"
            homepage "https://github.com/Goodmain/tunnel-manager"

            depends_on formula: "awscli"
            depends_on cask: ["aws-vault", "session-manager-plugin"]

            app "TunnelManager.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/TunnelManager.app"]
            end

            zap trash: ["~/Library/Preferences/com.pmg.TunnelManager.plist"]
          end
          EOF
          cd tap
          if git diff --quiet; then
            echo "Cask unchanged; nothing to push."
          else
            git add Casks/tunnel-manager.rb
            git -c user.name="release-bot" \
                -c user.email="release-bot@users.noreply.github.com" \
                commit -m "tunnel-manager ${VERSION}"
            git push
          fi
